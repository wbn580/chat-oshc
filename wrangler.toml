name = "chat-oshc"
main = "src/index.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "chat-oshc-leads"
database_id = "eb98f793-fdda-458b-8e6b-ded3576807f0"

[[vectorize]]
binding = "KB"
index_name = "kb-oshc"

[vars]
COHORTGO_PARTNER_CODE = "au-unilink"
COHORTGO_REFERRER_ID = "0df195ef-7f4d-4faf-82e2-1878faa84597"
COHORTGO_BASE_URL = "https://cohortflow.com/api/v1"
FLYWIRE_REFERRER_UUID = "0df195ef-7f4d-4faf-82e2-1878faa84597"
DEEPSEEK_BASE_URL = "https://api.deepseek.com/v1"
DASHSCOPE_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
DEFAULT_MODEL_CHAT = "deepseek-v4-pro"
DEFAULT_MODEL_EXTRACT = "deepseek-v4-flash"
EMBEDDING_MODEL = "text-embedding-v3"

# Secrets（用 wrangler secret put 设置）
# COHORTGO_API_USERNAME
# COHORTGO_API_PASSWORD
# DSPRO_API_KEY
# DASHSCOPE_API_KEY
# RESEND_API_KEY

[[routes]]
pattern = "chat.oshc.net"
custom_domain = true

[observability]
enabled = true
head_sampling_rate = 0.01
